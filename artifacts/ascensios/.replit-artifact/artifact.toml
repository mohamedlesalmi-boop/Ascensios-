kind = "web"
previewPath = "/"
title = "Ascensios"
version = "1.0.0"
id = "artifacts/ascensios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22166

[services.development]
run = "pnpm --filter @workspace/ascensios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ascensios", "run", "build" ]
publicDir = "artifacts/ascensios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22166"
BASE_PATH = "/"
