<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Outer hexagon -->
  <polygon points="90,8 158,47 158,125 90,164 22,125 22,47" fill="none" stroke="#0052CC" stroke-width="8" stroke-linejoin="round"/>
  <!-- Inner hexagon -->
  <polygon points="90,32 134,57 134,107 90,132 46,107 46,57" fill="none" stroke="#0052CC" stroke-width="5" stroke-linejoin="round"/>
  <!-- Eye outline -->
  <ellipse cx="90" cy="82" rx="22" ry="14" fill="none" stroke="white" stroke-width="4"/>
  <!-- Eye iris -->
  <circle cx="90" cy="82" r="7" fill="white"/>
  <!-- Eye pupil -->
  <circle cx="90" cy="82" r="3.5" fill="#0052CC"/>
  <!-- Eye highlight -->
  <circle cx="93" cy="79" r="1.5" fill="white"/>
  <!-- Radiating upward lines (growth/ascension) -->
  <line x1="90" y1="26" x2="90" y2="14" stroke="#0052CC" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="31" x2="65" y2="21" stroke="#0052CC" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="31" x2="115" y2="21" stroke="#0052CC" stroke-width="3" stroke-linecap="round"/>
  <line x1="57" y1="44" x2="46" y2="37" stroke="#0052CC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="123" y1="44" x2="134" y2="37" stroke="#0052CC" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Background fill for inner hex -->
  <polygon points="90,32 134,57 134,107 90,132 46,107 46,57" fill="#0052CC" opacity="0.08"/>
</svg>
